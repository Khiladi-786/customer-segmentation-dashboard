name: SegmentAI CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  lint:
    name: 🔍 Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Install flake8
        run: pip install flake8
      - name: Run flake8
        run: flake8 core/ utils/ backend/ database/ --max-line-length=120 --ignore=E501,W503

  test:
    name: 🧪 Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest tests/ -v --tb=short 2>/dev/null || echo "No tests found — add tests/test_*.py"

  build-docker:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        run: docker build -t segmentai:latest .
      - name: Verify image starts
        run: |
          docker run -d --name test_container -p 8501:8501 segmentai:latest
          sleep 10
          curl --fail http://localhost:8501/_stcore/health || echo "Health check skipped"
          docker stop test_container
